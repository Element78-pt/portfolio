<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pt Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #dcdcdc, #ffffff);
  color: #333;
}

/* ナビ */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  z-index: 10;
}

nav a {
  text-decoration: none;
  color: #555;
}

header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(#e0e0e0, #ffffff);
}

h1 {
  font-size: 48px;
  letter-spacing: 5px;
}

.section {
  padding: 60px;
}

/* About */
.about {
  max-width: 600px;
  line-height: 1.8;
}

/* 作品 */
.works {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 40px;
}

/* カード */
.card {
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  display: block;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

/* Contact */
.contact a {
  display: inline-block;
  margin-top: 10px;
  color: #666;
}

/* フッター */
footer {
  text-align: center;
  padding: 40px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<nav>
  <a href="#about">About</a>
  <a href="#works">Works</a>
  <a href="#contact">Contact</a>
</nav>

<header>
  <h1>pt</h1>
  <p class="tagline">Silver & Transparent World</p>
</header>

<section id="about" class="section">
  <h2>About</h2>
  <p class="about">
    イラスト初心者。<br>
    ポートフォリオを作ってみた。<br>
    使用ツール：CLIP STUDIO / ibisPaint
  </p>
</section>

<section id="works" class="section">
  <h2>Works</h2>
  <div class="works">
    <div class="card"><img src="img1.jpg"></div>
    <div class="card"><img src="img2.jpg"></div>
    <div class="card"><img src="img3.jpg"></div>
  </div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <div class="contact">
    <p>ご依頼受付中です。</p>
    <a href="#">Twitter</a><br>
    <a href="#">pixiv</a>
  </div>
</section>

<footer>
  © pt Portfolio
</footer>

</body>
</html>
