<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>pt Portfolio</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  color: #333;
}
header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(#e0e0e0, #ffffff);
}
h1 {
  font-size: 48px;
  letter-spacing: 5px;
}
.section {
  padding: 60px;
}
.works {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.works img {
  width: 100%;
  transition: 0.3s;
}
.works img:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<header>
  <h1>pt</h1>
</header>

<div class="section">
  <h2>About</h2>
  <p>透明感のある銀色の世界観を描くイラストレーター。</p>
</div>

<div class="section">
  <h2>Works</h2>
  <div class="works">
    <img src="sample1.jpg">
    <img src="sample2.jpg">
    <img src="sample3.jpg">
  </div>
</div>

</body>
</html>
