<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>pt Portfolio</title>
<style>
body {
  margin: 0;
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #dcdcdc, #ffffff);
  color: #333;
}

/* ナビ */
nav {
  position: fixed;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 40px;
  padding: 15px;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
}

/* ヘッダー */
header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

h1 {
  font-size: 72px;
  letter-spacing: 10px;
}

/* セクション */
.section {
  padding: 120px 10%;
}

/* ガラスカード */
.card {
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px);
}

/* 作品 */
.works {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 40px;
}

.card img {
  width: 100%;
  display: block;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

/* タイトル */
h2 {
  font-weight: 500;
  margin-bottom: 20px;
}
</style>
}
header {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(#e0e0e0, #ffffff);
}
h1 {
  font-size: 48px;
  letter-spacing: 5px;
}
.section {
  padding: 60px;
}
</div>
}
</style>
</head>

<body>

<header>
  <h1>pt</h1>
</header>

<div class="section">
  <h2>About</h2>
  <p>イラスト初心者。</p>
</div>

<div class="section">
  <h2>Works</h2>
  <div class="works">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
  </div>
</div>

</body>
</html>
